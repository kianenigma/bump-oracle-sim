<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Bump Simulation</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg: #1b1d23; --bg-surface: #22252b; --bg-elevated: #2a2d34;
      --border: #363940; --border-light: #2e3138;
      --text: #d4d4d8; --text-muted: #8b8d94; --text-dim: #5c5e66;
      --accent: #e4e4e7; --accent-bg: #2e3138;
      --active-bg: #d4d4d8; --active-text: #1b1d23;
      --hover-bg: #2e3138;
      --chart-bg: #1b1d23; --chart-grid: #262930; --chart-text: #8b8d94;
      --table-stripe: #22252b; --table-hover: #2a2d34;
      --input-bg: #22252b; --input-border: #363940;
      --overlay-bg: rgba(27,29,35,0.75);
      --tag-bg: #2a2d34;
    }
    :root[data-theme="light"] {
      --bg: #f7f7f5; --bg-surface: #efeee9; --bg-elevated: #e7e6e1;
      --border: #d5d4cf; --border-light: #e0dfda;
      --text: #2c2c2a; --text-muted: #6b6b68; --text-dim: #9a9a96;
      --accent: #2c2c2a; --accent-bg: #e0dfda;
      --active-bg: #3c3c3a; --active-text: #f7f7f5;
      --hover-bg: #e7e6e1;
      --chart-bg: #f7f7f5; --chart-grid: #eae9e4; --chart-text: #6b6b68;
      --table-stripe: #f2f1ec; --table-hover: #eae9e4;
      --input-bg: #f7f7f5; --input-border: #d5d4cf;
      --overlay-bg: rgba(247,247,245,0.75);
      --tag-bg: #e7e6e1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    #header { padding: 10px 24px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    #header-left { display: flex; align-items: center; gap: 16px; }
    #header h1 { font-size: 18px; font-weight: 600; }
    #config-info { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
    #config-info span { background: var(--tag-bg); padding: 2px 8px; border-radius: 4px; }
    #header-right { display: flex; gap: 6px; align-items: center; }

    /* Tab buttons in header */
    .tab-btn { background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.12s; }
    .tab-btn:hover { background: var(--hover-bg); color: var(--text); }
    .tab-btn.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }

    #theme-toggle { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; color: var(--text-muted); }
    #theme-toggle:hover { background: var(--hover-bg); color: var(--text); }

    .toolbar { padding: 5px 24px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar-group { display: flex; gap: 3px; align-items: center; }
    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }
    .toolbar-label { font-size: 11px; color: var(--text-dim); margin-right: 4px; white-space: nowrap; }
    .tb { background: var(--accent-bg); color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; padding: 3px 9px; font-size: 11px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .tb:hover:not(:disabled) { background: var(--hover-bg); color: var(--text); }
    .tb.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }
    .tb:disabled { opacity: 0.35; cursor: not-allowed; }
    .toolbar-hint { font-size: 10px; color: var(--text-dim); margin-left: auto; }
    kbd { background: var(--tag-bg); padding: 1px 4px; border-radius: 3px; font-size: 10px; font-family: inherit; }

    .series-selector { padding: 5px 24px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .series-selector label { font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .series-selector label input { cursor: pointer; }
    .series-selector .sel-link { font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: underline; user-select: none; }
    .series-selector .sel-link:hover { color: var(--text); }
    .series-selector .sel-sep { font-size: 10px; color: var(--text-dim); }

    #chart-tab { display: flex; flex-direction: column; min-height: 0; }
    #chart-tab.hidden, #stats-tab.hidden { display: none !important; }
    #price-chart { flex: 3; position: relative; min-height: 0; }
    #deviation-chart { flex: 1; border-top: 1px solid var(--border); position: relative; min-height: 0; }
    .chart-label { position: absolute; top: 8px; left: 12px; font-size: 11px; color: var(--text-muted); z-index: 2; pointer-events: none; font-weight: 500; letter-spacing: 0.3px; }

    .drag-select { position: fixed; background: rgba(128,128,128,0.12); border-left: 2px solid rgba(128,128,128,0.6); border-right: 2px solid rgba(128,128,128,0.6); pointer-events: none; z-index: 50; }

    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--overlay-bg); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text-muted);
      transition: opacity 0.2s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-bar {
      display: none; align-items: center; gap: 6px;
      padding: 2px 10px; border-radius: 4px;
      background: rgba(234,179,8,0.15); border: 1px solid rgba(234,179,8,0.4);
      font-size: 11px; color: #eab308; font-weight: 500;
    }
    #loading-bar.visible { display: flex; }
    #loading-bar .spinner-sm {
      width: 12px; height: 12px; border: 2px solid rgba(234,179,8,0.3);
      border-top-color: #eab308; border-radius: 50%; animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    #sidebar {
      width: 240px; min-width: 240px; background: var(--bg-surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; transition: width 0.15s, min-width 0.15s;
    }
    #sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
    #sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #sidebar-header span { font-size: 11px; font-weight: 600; white-space: nowrap; }
    #sidebar-actions { display: flex; gap: 6px; align-items: center; }
    #sidebar-actions .sel-link { font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: underline; user-select: none; }
    #sidebar-actions .sel-link:hover { color: var(--text); }
    #sidebar-actions .sel-sep { font-size: 10px; color: var(--text-dim); }
    #sidebar-search {
      margin: 6px 8px; padding: 4px 8px; font-size: 11px; border-radius: 4px;
      background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); outline: none;
    }
    #sidebar-search::placeholder { color: var(--text-dim); }
    #sidebar-search:focus { border-color: var(--text-muted); }
    #scenario-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    #scenario-list label {
      display: flex; align-items: center; gap: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #scenario-list label:hover { background: var(--hover-bg); }
    #scenario-list label input { cursor: pointer; flex-shrink: 0; }
    #scenario-list label .sc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    #scenario-list label .sc-name { overflow: hidden; text-overflow: ellipsis; }

    #sidebar-toggle {
      background: var(--accent-bg); color: var(--text-muted); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 7px; font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    #sidebar-toggle:hover { background: var(--hover-bg); color: var(--text); }

    #main-area { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    #stats-tab { padding: 20px 24px; overflow-y: auto; min-height: 0; }
    #stats-filter { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    #stats-filter input { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 4px; padding: 6px 10px; font-size: 13px; color: var(--text); outline: none; width: 300px; }
    #stats-filter input::placeholder { color: var(--text-dim); }
    #stats-filter input:focus { border-color: var(--text-muted); }
    .filter-hint { font-size: 11px; color: var(--text-dim); }

    #stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #stats-table th { position: sticky; top: 0; background: var(--bg-surface); border-bottom: 2px solid var(--border); padding: 8px 10px; text-align: left; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
    #stats-table th:hover { background: var(--hover-bg); }
    #stats-table th .sort-arrow { font-size: 10px; margin-left: 4px; color: var(--text-dim); }
    #stats-table th .sort-arrow.active { color: var(--text); }
    #stats-table td { padding: 6px 10px; border-bottom: 1px solid var(--border-light); white-space: nowrap; }
    #stats-table tbody tr:nth-child(even) { background: var(--table-stripe); }
    #stats-table tbody tr:hover { background: var(--table-hover); }
    #stats-table td.num { text-align: left; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="loading-overlay"><div class="spinner"></div><span>Loading...</span></div>

  <div id="header">
    <div id="header-left">
      <h1>Oracle Bump Simulation</h1>
      <div id="config-info"></div>
    </div>
    <div id="header-right">
      <div id="loading-bar"><div class="spinner-sm"></div><span>Loading...</span></div>
      <button class="tab-btn active" data-tab="chart">Chart</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
      <button id="theme-toggle" title="Toggle light/dark theme">Light</button>
    </div>
  </div>

  <div class="toolbar" id="toolbar-tf">
    <div class="toolbar-group">
      <span class="toolbar-label">Timeframe:</span>
      <button class="tb tf-btn" data-tf="6">6s</button>
      <button class="tb tf-btn" data-tf="60">1m</button>
      <button class="tb tf-btn active" data-tf="900">15m</button>
      <button class="tb tf-btn" data-tf="3600">1h</button>
      <button class="tb tf-btn" data-tf="21600">6h</button>
      <button class="tb tf-btn" data-tf="43200">12h</button>
      <button class="tb tf-btn" data-tf="86400">1d</button>
      <button class="tb tf-btn" data-tf="604800">1w</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">View:</span>
      <button class="tb view-btn active" data-view="candle">Candle</button>
      <button class="tb view-btn" data-view="line">Line</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span class="toolbar-label">Nav:</span>
      <button class="tb" id="btn-left" title="Pan left (ArrowLeft)">&#9664;</button>
      <button class="tb" id="btn-right" title="Pan right (ArrowRight)">&#9654;</button>
      <button class="tb" id="btn-zoom-in" title="Zoom in (+)">+</button>
      <button class="tb" id="btn-zoom-out" title="Zoom out (-)">&#8722;</button>
      <button class="tb" id="btn-reset" title="Reset to full view (R)">Reset</button>
    </div>
    <span class="toolbar-hint">
      <kbd>Click+Drag</kbd> select range &nbsp; <kbd>Dbl-click</kbd> reset &nbsp; <kbd>Scroll</kbd> zoom &nbsp; <kbd>&#8592;&#8594;</kbd> pan &nbsp; <kbd>+/-</kbd> zoom &nbsp; <kbd>R</kbd> reset
    </span>
  </div>

  <div class="series-selector" id="series-selector">
    <span style="font-size:11px;color:var(--text-muted);">Series:</span>
    <div id="series-checkboxes" style="display:contents;"></div>
    <span style="margin-left:auto;"></span>
    <button id="sidebar-toggle" style="display:none;" title="Toggle scenario panel">Scenarios &#9656;</button>
  </div>

  <div id="main-area">
    <div id="sidebar" class="collapsed">
      <div id="sidebar-header">
        <span>Scenarios</span>
        <div id="sidebar-actions">
          <span class="sel-link" id="sc-all">All</span>
          <span class="sel-sep">/</span>
          <span class="sel-link" id="sc-none">None</span>
        </div>
      </div>
      <input type="text" id="sidebar-search" placeholder="Filter...">
      <div id="scenario-list"></div>
    </div>

    <div id="chart-tab" style="flex:1;min-width:0;">
      <div id="price-chart"><span class="chart-label">Price</span></div>
      <div id="deviation-chart"><span class="chart-label">Deviation %</span></div>
    </div>

    <div id="stats-tab" class="hidden" style="flex:1;min-width:0;">
      <div id="stats-filter">
        <input type="text" id="stats-search" placeholder="Filter rows... (e.g. epsilon=0.000333 or 10% malicious)">
        <span class="filter-hint">Type to filter, click column headers to sort</span>
      </div>
      <table id="stats-table">
        <thead><tr id="stats-header"></tr></thead>
        <tbody id="stats-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ── Always server mode ──

    function generateColors(n) {
      const out = [];
      for (let i = 0; i < n; i++) {
        const hue = (i * 137.508) % 360;
        const s = 0.75, l = 0.58;
        const a = s * Math.min(l, 1 - l);
        const f = (k) => {
          const t = (k + hue / 30) % 12;
          return l - a * Math.max(Math.min(t - 3, 9 - t, 1), -1);
        };
        const r = Math.round(f(0) * 255);
        const g = Math.round(f(8) * 255);
        const b = Math.round(f(4) * 255);
        out.push('#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1));
      }
      return out;
    }
    let COLORS = generateColors(32);
    const REAL_COLOR = '#888888';

    // ── State ──
    let currentTF = 900;
    let currentView = 'candle';
    let currentTab = 'chart';

    let serverMeta = null;
    let bufferedFrom = 0;
    let bufferedTo = 0;
    let bufferedTF = 0;
    let bufferedScenarios = '';
    let lastServerData = null;
    let lastServerView = null;
    let fetchController = null;
    let fetchDebounceTimer = null;
    let totalTimeRange = null;
    let activeScenarios = new Set();
    let isInitialLoad = true;
    const scenarioColorMap = new Map();

    // ── Theme ──
    function getThemeChartOptions() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      return {
        bg: isDark ? '#111' : '#fff',
        grid: isDark ? '#1e1e1e' : '#f0f0f0',
        text: isDark ? '#888' : '#666',
        border: isDark ? '#333' : '#ddd',
      };
    }

    function applyChartTheme() {
      const t = getThemeChartOptions();
      const opts = {
        layout: { background: { color: t.bg }, textColor: t.text },
        grid: { vertLines: { color: t.grid }, horzLines: { color: t.grid } },
        rightPriceScale: { borderColor: t.border },
        timeScale: { borderColor: t.border },
      };
      priceChart.applyOptions(opts);
      devChart.applyOptions(opts);
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      document.getElementById('theme-toggle').textContent = isDark ? 'Dark' : 'Light';
      applyChartTheme();
    });

    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;

        document.getElementById('chart-tab').classList.toggle('hidden', currentTab !== 'chart');
        document.getElementById('stats-tab').classList.toggle('hidden', currentTab !== 'stats');
        document.getElementById('toolbar-tf').style.display = currentTab === 'chart' ? '' : 'none';
        document.getElementById('series-selector').style.display = currentTab === 'chart' ? '' : 'none';

        if (currentTab === 'chart') {
          priceChart.applyOptions({ width: priceChartEl.clientWidth, height: priceChartEl.clientHeight });
          devChart.applyOptions({ width: devChartEl.clientWidth, height: devChartEl.clientHeight });
        }
      });
    });

    // ── Loading overlay ──
    const loadingEl = document.getElementById('loading-overlay');
    const loadingBar = document.getElementById('loading-bar');
    function showLoading() {
      if (isInitialLoad) loadingEl.classList.remove('hidden');
      else loadingBar.classList.add('visible');
    }
    function hideLoading() {
      loadingEl.classList.add('hidden');
      loadingBar.classList.remove('visible');
    }


    // ══════════════════════════════════════════════
    // ── STATS TABLE ──
    // ══════════════════════════════════════════════

    // Column definitions: { key, label, type: 'string'|'number', getter: (scenario) => value }
    const STATS_COLUMNS = [
      { key: 'label', label: 'Label', type: 'string', getter: sc => sc.config.label || 'default' },
      { key: 'validators', label: 'Validators', type: 'number', getter: sc => sc.config.validatorCount },
      { key: 'validatorMix', label: 'Validator Mix', type: 'string', getter: sc => {
        const mix = sc.config.validatorMix || {};
        const parts = Object.entries(mix).map(([k, v]) => `${(v*100).toFixed(0)}% ${k}`);
        const honestPct = 100 - Object.values(mix).reduce((a, b) => a + b, 0) * 100;
        return `${honestPct.toFixed(0)}% honest` + (parts.length ? ', ' + parts.join(', ') : '');
      }},
      { key: 'epsilon', label: 'Epsilon', type: 'number', getter: sc => typeof sc.config.epsilon === 'number' ? sc.config.epsilon : 0 },
      { key: 'seed', label: 'Seed', type: 'number', getter: sc => sc.config.seed },
      { key: 'jitter', label: 'Jitter', type: 'number', getter: sc => sc.config.jitterStdDev },
      { key: 'totalBlocks', label: 'Total Blocks', type: 'number', getter: sc => sc.summary.totalBlocks },
      { key: 'meanDevPct', label: 'Mean Dev %', type: 'number', getter: sc => sc.summary.meanDeviationPct },
      { key: 'maxDevPct', label: 'Max Dev %', type: 'number', getter: sc => sc.summary.maxDeviationPct },
      { key: 'convergence', label: 'Convergence %', type: 'number', getter: sc => sc.summary.convergenceRate * 100 },
      { key: 'convThreshold', label: 'Conv. Threshold', type: 'number', getter: sc => sc.summary.convergenceThreshold },
      { key: 'devIntegral', label: 'Dev Integral (%-s)', type: 'number', getter: sc => sc.summary.deviationIntegral },
      { key: 'maxDevRate', label: 'Max Dev Rate (%/s)', type: 'number', getter: sc => sc.summary.maxDeviationRate },
    ];

    let statsData = []; // array of { row values keyed by column key }
    let statsSortKey = null;
    let statsSortAsc = true;

    function fmtNum(val, col) {
      if (col.type !== 'number') return val;
      if (typeof val !== 'number') return val;
      // Smart formatting based on magnitude
      if (col.key === 'epsilon' || col.key === 'jitter') return val.toFixed(6);
      if (col.key === 'meanDevPct' || col.key === 'maxDevPct') return val.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 });
      if (col.key === 'convergence') return val.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
      if (col.key === 'convThreshold') return val.toFixed(2);
      if (col.key === 'devIntegral') return val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (col.key === 'maxDevRate') return val.toFixed(6);
      // Default: use toLocaleString for thousand separators
      if (Number.isInteger(val)) return val.toLocaleString();
      return val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function buildStatsTable(scenarios) {
      // Build raw data
      statsData = scenarios.map(sc => {
        const row = {};
        for (const col of STATS_COLUMNS) {
          row[col.key] = col.getter(sc);
        }
        return row;
      });

      // Build header
      const headerRow = document.getElementById('stats-header');
      headerRow.innerHTML = '';
      for (const col of STATS_COLUMNS) {
        const th = document.createElement('th');
        th.textContent = col.label;
        const arrow = document.createElement('span');
        arrow.className = 'sort-arrow';
        arrow.textContent = '';
        th.appendChild(arrow);
        th.addEventListener('click', () => sortStats(col.key, arrow));
        headerRow.appendChild(th);
      }

      renderStatsRows();
    }

    function sortStats(key, arrowEl) {
      if (statsSortKey === key) {
        statsSortAsc = !statsSortAsc;
      } else {
        statsSortKey = key;
        statsSortAsc = true;
      }

      // Update arrows
      document.querySelectorAll('#stats-header .sort-arrow').forEach(a => {
        a.textContent = '';
        a.classList.remove('active');
      });
      arrowEl.textContent = statsSortAsc ? ' \u25B2' : ' \u25BC';
      arrowEl.classList.add('active');

      renderStatsRows();
    }

    function renderStatsRows() {
      const filterText = (document.getElementById('stats-search').value || '').toLowerCase();

      // Filter
      let rows = statsData;
      if (filterText) {
        rows = rows.filter(row => {
          return STATS_COLUMNS.some(col => {
            const val = row[col.key];
            const formatted = fmtNum(val, col);
            return String(formatted).toLowerCase().includes(filterText) ||
                   col.label.toLowerCase().includes(filterText);
          });
        });
      }

      // Sort
      if (statsSortKey) {
        const col = STATS_COLUMNS.find(c => c.key === statsSortKey);
        rows = [...rows].sort((a, b) => {
          const va = a[statsSortKey];
          const vb = b[statsSortKey];
          let cmp = 0;
          if (col && col.type === 'number') {
            cmp = (va || 0) - (vb || 0);
          } else {
            cmp = String(va).localeCompare(String(vb));
          }
          return statsSortAsc ? cmp : -cmp;
        });
      }

      // Render
      const tbody = document.getElementById('stats-body');
      tbody.innerHTML = '';
      for (const row of rows) {
        const tr = document.createElement('tr');
        for (const col of STATS_COLUMNS) {
          const td = document.createElement('td');
          td.textContent = fmtNum(row[col.key], col);
          if (col.type === 'number') td.className = 'num';
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    document.getElementById('stats-search').addEventListener('input', renderStatsRows);

    // ── Scenario sidebar ──

    let allScenarioEntries = [];

    const sidebarEl = document.getElementById('sidebar');
    const sidebarToggleBtn = document.getElementById('sidebar-toggle');
    const scenarioListEl = document.getElementById('scenario-list');
    const sidebarSearchEl = document.getElementById('sidebar-search');

    sidebarToggleBtn.addEventListener('click', () => {
      sidebarEl.classList.toggle('collapsed');
      sidebarToggleBtn.textContent = sidebarEl.classList.contains('collapsed') ? 'Scenarios \u25B8' : '\u25C2 Scenarios';
      setTimeout(() => {
        priceChart.applyOptions({ width: priceChartEl.clientWidth });
        devChart.applyOptions({ width: devChartEl.clientWidth });
      }, 160);
    });

    document.getElementById('sc-all').addEventListener('click', () => toggleAllScenarios(true));
    document.getElementById('sc-none').addEventListener('click', () => toggleAllScenarios(false));
    sidebarSearchEl.addEventListener('input', filterScenarioList);

    function buildScenarioSelector(scenarios) {
      if (scenarios.length <= 1) {
        sidebarToggleBtn.style.display = 'none';
        sidebarEl.classList.add('collapsed');
        return;
      }

      sidebarToggleBtn.style.display = '';
      sidebarEl.classList.remove('collapsed');
      sidebarToggleBtn.textContent = '\u25C2 Scenarios';

      scenarioListEl.innerHTML = '';
      allScenarioEntries = [];
      scenarioColorMap.clear();

      for (const sc of scenarios) {
        const idx = scenarios.indexOf(sc);
        const color = COLORS[idx % COLORS.length];
        scenarioColorMap.set(sc.index, color);
        const lbl = document.createElement('label');
        lbl.title = sc.config.label || `Scenario ${sc.index}`;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = activeScenarios.has(sc.index);
        cb.addEventListener('change', () => onScenarioToggle(sc.index, cb.checked));

        const dot = document.createElement('span');
        dot.className = 'sc-dot';
        dot.style.background = color;

        const name = document.createElement('span');
        name.className = 'sc-name';
        name.textContent = sc.config.label || `Scenario ${sc.index}`;

        lbl.appendChild(cb);
        lbl.appendChild(dot);
        lbl.appendChild(name);
        scenarioListEl.appendChild(lbl);
        allScenarioEntries.push({ el: lbl, cb, label: (sc.config.label || '').toLowerCase(), index: sc.index });
      }
    }

    function filterScenarioList() {
      const q = sidebarSearchEl.value.toLowerCase();
      for (const entry of allScenarioEntries) {
        entry.el.style.display = (!q || entry.label.includes(q)) ? '' : 'none';
      }
    }

    function onScenarioToggle(idx, enabled) {
      if (enabled) activeScenarios.add(idx);
      else activeScenarios.delete(idx);

      if (activeScenarios.size === 0) {
        clearPriceSeries();
        clearDevSeries();
        rebuildSeriesSelector();
        return;
      }

      bufferedTF = 0;
      const range = getVisibleTimeRange();
      const from = range ? range.from : totalTimeRange.from;
      const to = range ? range.to : totalTimeRange.to;
      fetchData(from, to, currentTF, false);
    }

    function toggleAllScenarios(enabled) {
      if (!serverMeta) return;
      const visible = allScenarioEntries.filter(e => e.el.style.display !== 'none');
      const targets = visible.length > 0 && visible.length < allScenarioEntries.length ? visible : allScenarioEntries;

      if (enabled) {
        for (const e of targets) { activeScenarios.add(e.index); e.cb.checked = true; }
      } else {
        for (const e of targets) { activeScenarios.delete(e.index); e.cb.checked = false; }
      }

      if (activeScenarios.size === 0) {
        clearPriceSeries();
        clearDevSeries();
        rebuildSeriesSelector();
        return;
      }

      bufferedTF = 0;
      const range = getVisibleTimeRange();
      const from = range ? range.from : totalTimeRange.from;
      const to = range ? range.to : totalTimeRange.to;
      fetchData(from, to, currentTF, false);
    }

    // ── Charts ──
    const priceChartEl = document.getElementById('price-chart');
    const t = getThemeChartOptions();
    const priceChart = LightweightCharts.createChart(priceChartEl, {
      layout: { background: { color: t.bg }, textColor: t.text },
      grid: { vertLines: { color: t.grid }, horzLines: { color: t.grid } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: t.border },
      timeScale: { borderColor: t.border, timeVisible: true, secondsVisible: true },
    });

    const devChartEl = document.getElementById('deviation-chart');
    const devChart = LightweightCharts.createChart(devChartEl, {
      layout: { background: { color: t.bg }, textColor: t.text },
      grid: { vertLines: { color: t.grid }, horzLines: { color: t.grid } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: t.border },
      timeScale: { borderColor: t.border, timeVisible: true, secondsVisible: false },
    });

    // ── Series management ──
    let activePriceSeries = [];
    let activeDevSeries = [];
    let seriesVisibility = {};

    function clearPriceSeries() {
      for (const s of activePriceSeries) priceChart.removeSeries(s.series);
      activePriceSeries = [];
    }
    function clearDevSeries() {
      for (const s of activeDevSeries) devChart.removeSeries(s.series);
      activeDevSeries = [];
    }

    // ── Series selector checkboxes ──
    function rebuildSeriesSelector() {
      const el = document.getElementById('series-checkboxes');
      el.innerHTML = '';

      const hasSidebar = serverMeta && serverMeta.scenarios.length > 1;
      if (!hasSidebar) {
        for (let i = 0; i < activeDevSeries.length; i++) {
          const priceSeries = activePriceSeries[1 + i];
          const devSeries = activeDevSeries[i];
          if (!priceSeries || !devSeries) continue;
          const displayLabel = priceSeries.label.replace(/^Oracle: /, '');
          addSelectorCheckbox(el, displayLabel, priceSeries.color, [priceSeries, devSeries]);
        }

        const allLink = document.createElement('span');
        allLink.className = 'sel-link';
        allLink.textContent = 'All';
        allLink.addEventListener('click', () => setAllSeriesVisibility(true));

        const sep = document.createElement('span');
        sep.className = 'sel-sep';
        sep.textContent = '/';

        const noneLink = document.createElement('span');
        noneLink.className = 'sel-link';
        noneLink.textContent = 'None';
        noneLink.addEventListener('click', () => setAllSeriesVisibility(false));

        el.appendChild(allLink);
        el.appendChild(sep);
        el.appendChild(noneLink);
      }
    }

    function setAllSeriesVisibility(visible) {
      for (const entry of activePriceSeries) {
        if (entry.label === 'Real Price') continue;
        seriesVisibility[entry.label] = visible;
        entry.series.applyOptions({ visible });
        if (!visible && entry.priceLine) {
          entry.priceLine.applyOptions({ axisLabelVisible: false });
        }
      }
      for (const entry of activeDevSeries) {
        seriesVisibility[entry.label] = visible;
        entry.series.applyOptions({ visible });
        if (!visible && entry.priceLine) {
          entry.priceLine.applyOptions({ axisLabelVisible: false });
        }
      }
      document.querySelectorAll('#series-checkboxes input[type="checkbox"]').forEach(cb => {
        cb.checked = visible;
      });
    }

    function addSelectorCheckbox(parent, displayLabel, color, seriesEntries) {
      const lbl = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      const visKey = seriesEntries[0].label;
      cb.checked = seriesVisibility[visKey] !== false;
      cb.addEventListener('change', () => {
        for (const entry of seriesEntries) {
          seriesVisibility[entry.label] = cb.checked;
          entry.series.applyOptions({ visible: cb.checked });
          if (!cb.checked && entry.priceLine) {
            entry.priceLine.applyOptions({ axisLabelVisible: false });
          }
        }
      });
      const dot = document.createElement('span');
      dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;`;
      lbl.appendChild(cb);
      lbl.appendChild(dot);
      lbl.appendChild(document.createTextNode(displayLabel));
      parent.appendChild(lbl);
    }


    // ══════════════════════════════════════════════
    // ── SERVER MODE ──
    // ══════════════════════════════════════════════

    function canUpdateInPlace(data) {
      if (lastServerView !== currentView) return false;
      if (activePriceSeries.length === 0) return false;
      const expectedPrice = 1 + data.oracles.length;
      const expectedDev = data.oracles.length;
      return activePriceSeries.length === expectedPrice && activeDevSeries.length === expectedDev;
    }

    function updateSeriesData(data) {
      const isCandle = currentView === 'candle';

      if (isCandle) {
        activePriceSeries[0].series.setData(data.realPrice.ohlc);
      } else {
        activePriceSeries[0].series.setData(data.realPrice.line);
      }

      data.oracles.forEach((oracle, idx) => {
        if (isCandle) {
          activePriceSeries[1 + idx].series.setData(oracle.ohlc);
        } else {
          activePriceSeries[1 + idx].series.setData(oracle.line);
        }
        activeDevSeries[idx].series.setData(oracle.deviation);
      });
    }

    function rebuildServerSeries(data) {
      clearPriceSeries();
      clearDevSeries();

      const isCandle = currentView === 'candle';
      lastServerView = currentView;

      const rpLabel = 'Real Price';
      if (isCandle) {
        const s = priceChart.addCandlestickSeries({
          upColor: '#5c6b73', downColor: '#5c6b73',
          wickUpColor: '#888', wickDownColor: '#888',
          borderUpColor: '#888', borderDownColor: '#888',
          lastValueVisible: false, priceLineVisible: false,
        });
        s.setData(data.realPrice.ohlc);
        activePriceSeries.push({ series: s, label: rpLabel, color: REAL_COLOR, kind: 'candle' });
      } else {
        const s = priceChart.addLineSeries({ color: REAL_COLOR, lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
        s.setData(data.realPrice.line);
        activePriceSeries.push({ series: s, label: rpLabel, color: REAL_COLOR, kind: 'line' });
      }

      data.oracles.forEach((oracle, idx) => {
        const color = scenarioColorMap.get(oracle.index) || COLORS[idx % COLORS.length];
        const oLabel = `Oracle: ${oracle.label}`;
        const visible = seriesVisibility[oLabel] !== false;

        if (isCandle) {
          const s = priceChart.addCandlestickSeries({
            upColor: color + 'CC', downColor: color + '66',
            wickUpColor: color, wickDownColor: color,
            borderUpColor: color, borderDownColor: color,
            visible, lastValueVisible: false, priceLineVisible: false,
          });
          s.setData(oracle.ohlc);
          activePriceSeries.push({ series: s, label: oLabel, color, kind: 'candle' });
        } else {
          const s = priceChart.addLineSeries({ color, lineWidth: 2, visible, lastValueVisible: false, priceLineVisible: false });
          s.setData(oracle.line);
          activePriceSeries.push({ series: s, label: oLabel, color, kind: 'line' });
        }

        const ds = devChart.addLineSeries({ color, lineWidth: 1, visible, lastValueVisible: false, priceLineVisible: false });
        ds.setData(oracle.deviation);
        activeDevSeries.push({ series: ds, label: `Dev: ${oracle.label}`, color, kind: 'line' });
      });

      rebuildSeriesSelector();
    }

    function activeScenarioParam() {
      if (!serverMeta) return 'all';
      const allIndices = serverMeta.scenarios.map(s => s.index);
      if (activeScenarios.size === allIndices.length) return 'all';
      return [...activeScenarios].join(',');
    }

    async function fetchData(from, to, tf, fitContent) {
      if (fetchController) fetchController.abort();
      fetchController = new AbortController();

      const scenarioParam = activeScenarioParam();

      showLoading();
      try {
        const params = new URLSearchParams({
          scenario: scenarioParam,
          from: String(from),
          to: String(to),
          tf: String(tf),
        });
        const res = await fetch(`/api/data?${params}`, { signal: fetchController.signal });
        const data = await res.json();

        bufferedFrom = data.from;
        bufferedTo = data.to;
        bufferedTF = data.tf;
        bufferedScenarios = scenarioParam;
        lastServerData = data;

        if (data.tf !== data.requestedTF) {
          currentTF = data.tf;
          document.querySelectorAll('.tf-btn').forEach(b => {
            b.classList.toggle('active', parseInt(b.dataset.tf) === currentTF);
          });
        }

        const savedTimeRange = fitContent ? null : getVisibleTimeRange();

        if (fetchDebounceTimer) {
          clearTimeout(fetchDebounceTimer);
          fetchDebounceTimer = null;
        }

        transitionLock = true;

        if (canUpdateInPlace(data)) {
          updateSeriesData(data);
        } else {
          rebuildServerSeries(data);
        }

        if (fitContent) {
          priceChart.timeScale().fitContent();
          devChart.timeScale().fitContent();
        } else if (savedTimeRange) {
          priceChart.timeScale().setVisibleRange(savedTimeRange);
          devChart.timeScale().setVisibleRange(savedTimeRange);
        }

        transitionLock = false;

        updateTFButtonStates();
      } catch (e) {
        if (e.name !== 'AbortError') console.error('Fetch error:', e);
        transitionLock = false;
      } finally {
        hideLoading();
        isInitialLoad = false;
      }
    }

    const TIMEFRAMES = [6, 60, 900, 3600, 21600, 43200, 86400, 604800];

    function smallestValidTF(span) {
      for (const tf of TIMEFRAMES) {
        if (span / tf <= 5000) return tf;
      }
      return TIMEFRAMES[TIMEFRAMES.length - 1];
    }

    function getViewportSpan() {
      const lr = priceChart.timeScale().getVisibleLogicalRange();
      if (!lr) return totalTimeRange ? (totalTimeRange.to - totalTimeRange.from) : 0;
      return (lr.to - lr.from) * currentTF;
    }

    function getViewportTimeRange() {
      const dataRange = priceChart.timeScale().getVisibleRange();
      const lr = priceChart.timeScale().getVisibleLogicalRange();
      if (!lr) return dataRange ? { from: dataRange.from, to: dataRange.to } : null;

      const span = (lr.to - lr.from) * currentTF;
      let center;
      if (dataRange) {
        center = (dataRange.from + dataRange.to) / 2;
      } else if (bufferedFrom && bufferedTo) {
        center = (bufferedFrom + bufferedTo) / 2;
      } else if (totalTimeRange) {
        center = (totalTimeRange.from + totalTimeRange.to) / 2;
      } else {
        return null;
      }
      return { from: center - span / 2, to: center + span / 2 };
    }

    function updateTFButtonStates() {
      if (!totalTimeRange) return;
      const span = getViewportSpan();

      document.querySelectorAll('.tf-btn').forEach(btn => {
        const tf = parseInt(btn.dataset.tf);
        btn.disabled = span / tf > 5000;
      });

      if (span / currentTF > 5000) {
        currentTF = smallestValidTF(span);
        document.querySelectorAll('.tf-btn').forEach(b => {
          b.classList.toggle('active', parseInt(b.dataset.tf) === currentTF);
        });
        bufferedTF = 0;
      }
    }

    function getVisibleTimeRange() {
      const range = priceChart.timeScale().getVisibleRange();
      if (!range) return null;
      return { from: range.from, to: range.to };
    }

    function onViewportChange() {
      if (transitionLock) return;

      updateTFButtonStates();

      const range = getViewportTimeRange();
      if (!range) return;

      const scenariosMatch = bufferedScenarios === activeScenarioParam();
      if (
        scenariosMatch &&
        bufferedTF === currentTF &&
        range.from >= bufferedFrom &&
        range.to <= bufferedTo
      ) {
        return;
      }

      if (fetchDebounceTimer) clearTimeout(fetchDebounceTimer);
      fetchDebounceTimer = setTimeout(() => {
        fetchData(range.from, range.to, currentTF, false);
      }, 200);
    }

    async function initServer() {
      showLoading();
      try {
        const res = await fetch('/api/meta');
        serverMeta = await res.json();

        const configEl = document.getElementById('config-info');
        if (serverMeta.scenarios.length === 1) {
          const c = serverMeta.scenarios[0].config;
          configEl.innerHTML = [
            `<span>Validators: ${c.validatorCount}</span>`,
            `<span>Mix: ${(() => { const m = c.validatorMix||{}; const parts = Object.entries(m).map(([k,v])=>(v*100).toFixed(0)+'% '+k); const h = 100-Object.values(m).reduce((a,b)=>a+b,0)*100; return h.toFixed(0)+'% honest'+(parts.length?', '+parts.join(', '):''); })()}</span>`,
            `<span>Epsilon: ${typeof c.epsilon==='number'?c.epsilon.toFixed(6):c.epsilon}</span>`,
            `<span>Seed: ${c.seed}</span>`,
            `<span>${c.startDate} to ${c.endDate}</span>`,
          ].join('');
        } else {
          configEl.innerHTML = `<span>${serverMeta.scenarioCount} scenarios compared</span>`+
            `<span>${serverMeta.scenarios[0].config.startDate} to ${serverMeta.scenarios[0].config.endDate}</span>`;
        }

        buildStatsTable(serverMeta.scenarios.map(sc => ({ config: sc.config, summary: sc.summary })));

        let minFrom = Infinity, maxTo = -Infinity;
        for (const sc of serverMeta.scenarios) {
          if (sc.timeRange.from < minFrom) minFrom = sc.timeRange.from;
          if (sc.timeRange.to > maxTo) maxTo = sc.timeRange.to;
        }
        totalTimeRange = { from: minFrom, to: maxTo };

        activeScenarios.clear();
        if (serverMeta.scenarios.length < 10) {
          for (const sc of serverMeta.scenarios) activeScenarios.add(sc.index);
        } else {
          activeScenarios.add(serverMeta.scenarios[0].index);
        }

        COLORS = generateColors(Math.max(32, serverMeta.scenarios.length));
        buildScenarioSelector(serverMeta.scenarios);
        updateTFButtonStates();

        await fetchData(totalTimeRange.from, totalTimeRange.to, currentTF, true);

        priceChart.timeScale().subscribeVisibleTimeRangeChange(onViewportChange);
      } catch (e) {
        console.error('Failed to initialize:', e);
        hideLoading();
      }
    }

    // ── Toolbar: timeframe buttons ──
    document.querySelectorAll('.tf-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTF = parseInt(btn.dataset.tf);

        bufferedTF = 0;
        const range = getVisibleTimeRange();
        const from = range ? range.from : totalTimeRange.from;
        const to = range ? range.to : totalTimeRange.to;
        fetchData(from, to, currentTF, false);
      });
    });

    // ── Toolbar: view mode buttons ──
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;

        if (lastServerData) {
          const savedRange = getVisibleTimeRange();

          if (fetchDebounceTimer) {
            clearTimeout(fetchDebounceTimer);
            fetchDebounceTimer = null;
          }

          transitionLock = true;
          rebuildServerSeries(lastServerData);
          if (savedRange) {
            priceChart.timeScale().setVisibleRange(savedRange);
            devChart.timeScale().setVisibleRange(savedRange);
          }
          transitionLock = false;
        }
      });
    });

    // ── Toolbar: nav buttons ──
    function getVisibleLogicalRange() {
      return priceChart.timeScale().getVisibleLogicalRange();
    }
    function panBy(frac) {
      const lr = getVisibleLogicalRange();
      if (!lr) return;
      const span = lr.to - lr.from;
      const shift = span * frac;
      priceChart.timeScale().setVisibleLogicalRange({ from: lr.from + shift, to: lr.to + shift });
    }
    function zoomBy(factor) {
      const lr = getVisibleLogicalRange();
      if (!lr) return;
      const center = (lr.from + lr.to) / 2;
      const newSpan = (lr.to - lr.from) * factor;
      priceChart.timeScale().setVisibleLogicalRange({ from: center - newSpan/2, to: center + newSpan/2 });
    }

    document.getElementById('btn-left').addEventListener('click', () => panBy(-0.25));
    document.getElementById('btn-right').addEventListener('click', () => panBy(0.25));
    document.getElementById('btn-zoom-in').addEventListener('click', () => zoomBy(0.5));
    document.getElementById('btn-zoom-out').addEventListener('click', () => zoomBy(2));
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (totalTimeRange) {
        const fullSpan = totalTimeRange.to - totalTimeRange.from;
        currentTF = smallestValidTF(fullSpan);
        document.querySelectorAll('.tf-btn').forEach(b => {
          b.classList.toggle('active', parseInt(b.dataset.tf) === currentTF);
        });
        updateTFButtonStates();
        bufferedTF = 0;
        fetchData(totalTimeRange.from, totalTimeRange.to, currentTF, true);
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key) {
        case 'ArrowLeft': panBy(-0.15); e.preventDefault(); break;
        case 'ArrowRight': panBy(0.15); e.preventDefault(); break;
        case '+': case '=': zoomBy(0.5); e.preventDefault(); break;
        case '-': zoomBy(2); e.preventDefault(); break;
        case '0': case 'r': case 'R':
          document.getElementById('btn-reset').click();
          e.preventDefault();
          break;
      }
    });

    // ── Sync charts ──
    let syncing = false;
    let transitionLock = false;
    priceChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || transitionLock || !range) return;
      syncing = true;
      devChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    devChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || transitionLock || !range) return;
      syncing = true;
      priceChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });

    function setVisibleRangeBoth(range) {
      transitionLock = true;
      priceChart.timeScale().setVisibleRange(range);
      devChart.timeScale().setVisibleRange(range);
      transitionLock = false;
    }

    // ── Crosshair-tracking price scale markers ──
    function ensurePriceLines(entries) {
      for (const entry of entries) {
        if (!entry.priceLine) {
          entry.priceLine = entry.series.createPriceLine({
            price: 0,
            color: entry.color,
            lineVisible: false,
            axisLabelVisible: false,
            lineWidth: 0,
            title: '',
          });
        }
      }
    }

    function updatePriceTracking(param) {
      ensurePriceLines(activePriceSeries);
      const hasData = param && param.time && param.seriesData;
      for (const entry of activePriceSeries) {
        if (!entry.priceLine) continue;
        const isVisible = hasData && seriesVisibility[entry.label] !== false;
        if (!isVisible) {
          entry.priceLine.applyOptions({ axisLabelVisible: false });
          continue;
        }
        const d = param.seriesData.get(entry.series);
        if (!d) {
          entry.priceLine.applyOptions({ axisLabelVisible: false });
          continue;
        }
        const val = d.close !== undefined ? d.close : d.value;
        const displayLabel = entry.label.replace(/^Oracle: /, '');
        entry.priceLine.applyOptions({
          price: val,
          axisLabelVisible: true,
          axisLabelColor: entry.color,
          title: displayLabel,
        });
      }
    }

    function updateDevTracking(param) {
      ensurePriceLines(activeDevSeries);
      const hasData = param && param.time && param.seriesData;
      for (const entry of activeDevSeries) {
        if (!entry.priceLine) continue;
        const isVisible = hasData && seriesVisibility[entry.label] !== false;
        if (!isVisible) {
          entry.priceLine.applyOptions({ axisLabelVisible: false });
          continue;
        }
        const d = param.seriesData.get(entry.series);
        if (!d) {
          entry.priceLine.applyOptions({ axisLabelVisible: false });
          continue;
        }
        const displayLabel = entry.label.replace(/^Dev: /, '');
        entry.priceLine.applyOptions({
          price: d.value,
          axisLabelVisible: true,
          axisLabelColor: entry.color,
          title: displayLabel,
        });
      }
    }

    priceChart.subscribeCrosshairMove(updatePriceTracking);
    devChart.subscribeCrosshairMove(updateDevTracking);

    // ── Resize ──
    const ro = new ResizeObserver(() => {
      if (currentTab === 'chart') {
        priceChart.applyOptions({ width: priceChartEl.clientWidth, height: priceChartEl.clientHeight });
        devChart.applyOptions({ width: devChartEl.clientWidth, height: devChartEl.clientHeight });
      }
    });
    ro.observe(priceChartEl);
    ro.observe(devChartEl);

    // ── Drag-to-zoom ──
    function setupDragZoom(containerEl, chart) {
      let startX = null;
      let isDragging = false;
      let selBox = null;
      const THRESHOLD = 8;

      containerEl.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        const rect = containerEl.getBoundingClientRect();
        const localY = e.clientY - rect.top;
        const localX = e.clientX - rect.left;
        if (localY > rect.height - 30) return;
        if (localX > rect.width - 60) return;
        startX = e.clientX;
        isDragging = false;
      });

      document.addEventListener('pointermove', (e) => {
        if (startX === null) return;
        const dx = e.clientX - startX;

        if (!isDragging && Math.abs(dx) >= THRESHOLD) {
          isDragging = true;
          const rect = containerEl.getBoundingClientRect();
          selBox = document.createElement('div');
          selBox.className = 'drag-select';
          selBox.style.top = rect.top + 'px';
          selBox.style.height = rect.height + 'px';
          document.body.appendChild(selBox);
        }

        if (isDragging && selBox) {
          const left = Math.min(startX, e.clientX);
          selBox.style.left = left + 'px';
          selBox.style.width = Math.abs(dx) + 'px';
        }
      });

      document.addEventListener('pointerup', (e) => {
        if (isDragging && selBox) {
          const rect = containerEl.getBoundingClientRect();
          const x1 = Math.min(startX, e.clientX) - rect.left;
          const x2 = Math.max(startX, e.clientX) - rect.left;

          const ts = chart.timeScale();
          const from = ts.coordinateToLogical(x1);
          const to = ts.coordinateToLogical(x2);

          if (from !== null && to !== null && Math.abs(to - from) > 1) {
            ts.setVisibleLogicalRange({ from, to });
          }

          selBox.remove();
          selBox = null;
        }
        startX = null;
        isDragging = false;
      });

      containerEl.addEventListener('dblclick', () => {
        priceChart.timeScale().fitContent();
        devChart.timeScale().fitContent();
      });
    }

    setupDragZoom(priceChartEl, priceChart);
    setupDragZoom(devChartEl, devChart);

    // ── Init ──
    initServer();
  </script>
</body>
</html>
